name: tests

# Three guards:
#  - smoke: loads index.html in a real headless browser and asserts the globe
#    actually paints (no blank canvas) with zero uncaught JS errors — the app's
#    most fragile, most invisible-to-review failure mode. See tests/smoke.mjs.
#  - parity: asserts the OpenSky normalizers in index.ts and server.py stay in
#    lockstep so the deliberately-duplicated proxies don't drift. See parity.mjs.
#  - flows: drives the core UI (map/satellite + layer toggles, My Flights, and
#    aircraft selection when live flights load) to catch regressions. flows.mjs.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test dependencies
        working-directory: tests
        run: npm install

      - name: Run backend parity test (index.ts vs server.py)
        working-directory: tests
        run: node parity.mjs

      - name: Install Chromium for Playwright
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run smoke test
        working-directory: tests
        run: node smoke.mjs

      - name: Run core-flows test
        working-directory: tests
        run: node flows.mjs
