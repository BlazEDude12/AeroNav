<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="AeroNav3D — interactive 3D globe powered by Cesium and Google Maps.">
<title>AeroNav3D — 3D Globe</title>

<!-- Cesium (free tier, CDN) -->
<script src="https://cesium.com/downloads/cesiumjs/releases/1.130/Build/Cesium/Cesium.js"></script>
<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.130/Build/Cesium/Widgets/widgets.css">

<style>
  :root{
    --bg:#070a12;
    --panel:rgba(13,18,30,.78);
    --border:rgba(120,160,220,.16);
    --text:#dfe7f1;
    --muted:#7c8aa0;
    --accent:#4cc3ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:var(--bg);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text);}

  #globe{position:absolute;inset:0;}
  #globe .cesium-viewer,#globe .cesium-widget,#globe .cesium-widget canvas{width:100%;height:100%;}

  /* Keep Google/Cesium attribution visible (required), but style it subtly */
  .cesium-viewer-bottom{left:12px!important;bottom:10px!important;}
  .cesium-credit-logoContainer{display:none!important;}
  .cesium-widget-credits,.cesium-widget-credits a{
    color:var(--muted)!important;font-size:10px!important;text-decoration:none!important;}

  /* ---------- Branding ---------- */
  .brand{
    position:absolute;top:20px;left:20px;z-index:10;
    display:flex;align-items:center;gap:12px;
    padding:10px 16px 10px 12px;border-radius:12px;
    background:var(--panel);border:1px solid var(--border);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    user-select:none;
  }
  .brand svg{display:block;}
  .brand .name{font-size:17px;font-weight:700;letter-spacing:.04em;}
  .brand .name em{font-style:normal;color:var(--accent);}
  .brand .tag{font-size:10px;letter-spacing:.28em;color:var(--muted);margin-top:2px;text-transform:uppercase;}

  /* ---------- Controls ---------- */
  .controls{
    position:absolute;right:20px;bottom:28px;z-index:10;
    display:flex;flex-direction:column;gap:8px;
  }
  .controls button{
    width:42px;height:42px;border-radius:10px;cursor:pointer;
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;
    transition:background .15s,border-color .15s,transform .1s;
  }
  .controls button:hover{background:rgba(40,55,85,.85);border-color:rgba(120,180,255,.4);}
  .controls button:active{transform:scale(.94);}
  .controls .divider{height:1px;background:var(--border);margin:2px 4px;}

  /* ---------- Hint / status ---------- */
  .hint{
    position:absolute;left:50%;bottom:28px;transform:translateX(-50%);z-index:10;
    padding:8px 16px;border-radius:999px;white-space:nowrap;
    background:var(--panel);border:1px solid var(--border);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    font-size:11px;color:var(--muted);letter-spacing:.06em;
    transition:opacity .8s;pointer-events:none;
  }
  .notice{
    position:absolute;top:20px;right:20px;z-index:10;max-width:320px;
    padding:12px 14px;border-radius:10px;font-size:12px;line-height:1.5;
    background:rgba(60,35,10,.85);border:1px solid rgba(255,170,60,.35);color:#ffd9a0;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;
  }
  #loader{
    position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;background:var(--bg);
    transition:opacity .6s;
  }
  #loader .ring{
    width:44px;height:44px;border-radius:50%;
    border:2px solid var(--border);border-top-color:var(--accent);
    animation:spin 1s linear infinite;
  }
  #loader span{font-size:11px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media (max-width:600px){
    .brand{top:12px;left:12px;padding:8px 12px 8px 10px;}
    .brand .name{font-size:15px;}
    .brand .tag{display:none;}
    .controls{right:12px;bottom:20px;}
    .controls button{width:38px;height:38px;}
    .hint{display:none;}
    .notice{top:auto;bottom:76px;right:12px;left:12px;max-width:none;}
  }
</style>
</head>
<body>

<div id="globe"></div>

<!-- Branding -->
<div class="brand" aria-label="AeroNav3D">
  <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="17" cy="17" r="13" stroke="#4cc3ff" stroke-width="1.4"/>
    <ellipse cx="17" cy="17" rx="13" ry="5.2" stroke="#4cc3ff" stroke-width="1" opacity=".55"/>
    <path d="M17 4v26M4 17h26" stroke="#4cc3ff" stroke-width=".7" opacity=".35"/>
    <path d="M23.5 10.5 15 19l-3.4-1.4-1.6 1.6 3.6 1.8 1.8 3.6 1.6-1.6L15.6 19l8.5-8.5-.6-.6Z" fill="#dfe7f1"/>
  </svg>
  <div>
    <div class="name">Aero<em>Nav</em>3D</div>
    <div class="tag">Global Navigation</div>
  </div>
</div>

<!-- Missing-key notice -->
<div class="notice" id="notice"></div>

<!-- Camera controls -->
<div class="controls" aria-label="Globe controls">
  <button id="zoomIn"  title="Zoom in"  aria-label="Zoom in">+</button>
  <button id="zoomOut" title="Zoom out" aria-label="Zoom out">−</button>
  <div class="divider"></div>
  <button id="tiltUp"   title="Tilt up"   aria-label="Tilt up">⤒</button>
  <button id="tiltDown" title="Tilt down" aria-label="Tilt down">⤓</button>
  <div class="divider"></div>
  <button id="home" title="Reset view" aria-label="Reset view">⌂</button>
</div>

<div class="hint" id="hint">Drag to pan &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Ctrl + drag to tilt</div>

<div id="loader"><div class="ring"></div><span>AeroNav3D</span></div>

<script>
"use strict";

/* ================= CONFIGURATION =================
 * Google Maps Platform API key with the "Map Tiles API" enabled:
 * https://console.cloud.google.com/google/maps-apis
 * Without a key, the globe falls back to Cesium's bundled
 * Natural Earth II imagery (no extra dependencies).
 * ================================================= */
const GOOGLE_MAPS_API_KEY = "AIzaSyA-n1jGuFhWQGcBPJNXauBWGnATg8Wg42U";
const GOOGLE_MAP_TYPE = "satellite"; // "satellite" | "roadmap" | "terrain"

const HOME_VIEW = {
  destination: Cesium.Cartesian3.fromDegrees(0, 18, 22_000_000),
  orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 }
};

/* ---------------- Viewer ---------------- */
const viewer = new Cesium.Viewer("globe", {
  baseLayer: false,
  baseLayerPicker: false,
  geocoder: false,
  homeButton: false,
  sceneModePicker: false,
  navigationHelpButton: false,
  animation: false,
  timeline: false,
  fullscreenButton: false,
  infoBox: false,
  selectionIndicator: false
});

const scene = viewer.scene;
scene.globe.baseColor = Cesium.Color.fromCssColorString("#0b1226");
scene.globe.enableLighting = false;
scene.globe.showGroundAtmosphere = true;
scene.skyAtmosphere.show = true;
scene.moon.show = false;
scene.fog.enabled = true;
scene.screenSpaceCameraController.minimumZoomDistance = 250;
scene.screenSpaceCameraController.maximumZoomDistance = 40_000_000;
viewer.camera.setView(HOME_VIEW);

/* ---------------- Google Maps base layer ---------------- */
async function loadGoogleBaseLayer() {
  // Map Tiles API: create a session, then request 2D tiles with it.
  const res = await fetch(
    "https://tile.googleapis.com/v1/createSession?key=" + encodeURIComponent(GOOGLE_MAPS_API_KEY),
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mapType: GOOGLE_MAP_TYPE, language: "en-US", region: "US" })
    }
  );
  if (!res.ok) throw new Error("createSession failed (" + res.status + ")");
  const { session } = await res.json();

  const provider = new Cesium.UrlTemplateImageryProvider({
    url: "https://tile.googleapis.com/v1/2dtiles/{z}/{x}/{y}"
       + "?session=" + encodeURIComponent(session)
       + "&key=" + encodeURIComponent(GOOGLE_MAPS_API_KEY),
    tilingScheme: new Cesium.WebMercatorTilingScheme(),
    maximumLevel: 22,
    credit: new Cesium.Credit("Map data © Google")
  });
  viewer.imageryLayers.addImageryProvider(provider);
}

// Fallback imagery shipped inside the Cesium build itself (no extra CDN).
async function loadFallbackLayer() {
  const provider = await Cesium.TileMapServiceImageryProvider.fromUrl(
    Cesium.buildModuleUrl("Assets/Textures/NaturalEarthII")
  );
  viewer.imageryLayers.addImageryProvider(provider);
}

function showNotice(html) {
  const el = document.getElementById("notice");
  el.innerHTML = html;
  el.style.display = "block";
}

(async function initImagery() {
  const keyMissing = !GOOGLE_MAPS_API_KEY || GOOGLE_MAPS_API_KEY === "YOUR_GOOGLE_MAPS_API_KEY";
  if (keyMissing) {
    await loadFallbackLayer();
    showNotice("<strong>Google Maps key not set.</strong><br>Showing fallback imagery. Add your Map Tiles API key to <code>GOOGLE_MAPS_API_KEY</code> in index.html to enable Google Maps.");
  } else {
    try {
      await loadGoogleBaseLayer();
    } catch (err) {
      console.error("Google Maps base layer failed:", err);
      await loadFallbackLayer();
      showNotice("<strong>Google Maps unavailable.</strong><br>" + err.message + " — showing fallback imagery. Check that the Map Tiles API is enabled for your key.");
    }
  }
  hideLoader();
})();

/* ---------------- Loader / hint ---------------- */
function hideLoader() {
  const loader = document.getElementById("loader");
  loader.style.opacity = "0";
  setTimeout(() => loader.remove(), 650);

  const hint = document.getElementById("hint");
  setTimeout(() => { hint.style.opacity = "0"; }, 6000);
}

/* ---------------- Controls ---------------- */
function cameraHeight() {
  return viewer.camera.positionCartographic.height;
}
function zoom(factor) {
  const amount = cameraHeight() * factor;
  if (factor > 0) viewer.camera.zoomIn(amount);
  else viewer.camera.zoomOut(-amount);
}
function tilt(deltaDeg) {
  const cam = viewer.camera;
  const pitch = Cesium.Math.clamp(
    cam.pitch + Cesium.Math.toRadians(deltaDeg),
    Cesium.Math.toRadians(-90),
    Cesium.Math.toRadians(-5)
  );
  cam.setView({ orientation: { heading: cam.heading, pitch, roll: 0 } });
}

document.getElementById("zoomIn").addEventListener("click", () => zoom(0.4));
document.getElementById("zoomOut").addEventListener("click", () => zoom(-0.6));
document.getElementById("tiltUp").addEventListener("click", () => tilt(10));
document.getElementById("tiltDown").addEventListener("click", () => tilt(-10));
document.getElementById("home").addEventListener("click", () => {
  viewer.camera.flyTo({ ...HOME_VIEW, duration: 1.6 });
});

// Keyboard shortcuts: +/- zoom, arrows tilt, H home
window.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  switch (e.key) {
    case "+": case "=": zoom(0.4); break;
    case "-": case "_": zoom(-0.6); break;
    case "ArrowUp":   if (e.shiftKey) { tilt(10);  e.preventDefault(); } break;
    case "ArrowDown": if (e.shiftKey) { tilt(-10); e.preventDefault(); } break;
    case "h": case "H": viewer.camera.flyTo({ ...HOME_VIEW, duration: 1.6 }); break;
  }
});
</script>
</body>
</html>
